<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSO Card Reader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: #1a1a1a;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      padding: 40px;
      max-width: 500px;
      width: 100%;
      border: 2px solid #333;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      color: #fff;
      font-size: 32px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
    }

    .header p {
      color: #aaa;
      font-size: 16px;
    }

    /* LED Indicator */
    .led-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .led {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      box-shadow: 0 0 30px currentColor;
      transition: all 0.3s;
      animation: pulse-glow 2s infinite;
    }

    .led.waiting {
      background: #ff9800;
      color: #fff;
      box-shadow: 0 0 40px #ff9800;
    }

    .led.ready {
      background: #4caf50;
      color: #fff;
      box-shadow: 0 0 50px #4caf50;
      animation: pulse-ready 1.5s infinite;
    }

    .led.reading {
      background: #2196f3;
      color: #fff;
      box-shadow: 0 0 50px #2196f3;
      animation: pulse-reading 0.8s infinite;
    }

    .led.error {
      background: #f44336;
      color: #fff;
      box-shadow: 0 0 40px #f44336;
    }

    .led.success {
      background: #4caf50;
      color: #fff;
      box-shadow: 0 0 60px #4caf50;
      animation: pulse-success 0.5s infinite;
    }

    .led-text {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      margin-top: 10px;
    }

    @keyframes pulse-glow {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.7;
        transform: scale(1.05);
      }
    }

    @keyframes pulse-ready {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
        box-shadow: 0 0 50px #4caf50;
      }
      50% {
        opacity: 0.8;
        transform: scale(1.1);
        box-shadow: 0 0 70px #4caf50;
      }
    }

    @keyframes pulse-reading {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.6;
        transform: scale(1.15);
      }
    }

    @keyframes pulse-success {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.9;
        transform: scale(1.2);
      }
    }

    .status-card {
      background: #2a2a2a;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #444;
    }

    .status-item {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
      padding: 10px;
      background: #1f1f1f;
      border-radius: 10px;
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .status-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 15px;
      font-size: 20px;
    }

    .status-icon.waiting {
      background: #ff9800;
      color: #fff;
    }

    .status-icon.success {
      background: #4caf50;
      color: #fff;
    }

    .status-icon.error {
      background: #f44336;
      color: #fff;
    }

    .status-icon.reading {
      background: #2196f3;
      color: #fff;
    }

    .status-icon.connected {
      background: #4caf50;
      color: #fff;
    }

    .status-icon.disconnected {
      background: #666;
      color: #fff;
    }

    .status-text {
      flex: 1;
    }

    .status-label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 5px;
    }

    .status-value {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 15px;
      background: #4caf50;
      color: white;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
      background: #45a049;
    }

    .button:active {
      transform: translateY(0);
    }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .info-text {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-top: 20px;
      padding: 15px;
      background: #1a1a1a;
      border-radius: 10px;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📱 SSO Card Reader</h1>
      <p>เสียบบัตรประชาชนเพื่อเช็คสิทธิ์</p>
    </div>

    <!-- LED Indicator -->
    <div class="led-container">
      <div class="led waiting" id="led-indicator">
        <span>⏳</span>
      </div>
      <div class="led-text" id="led-text">กำลังตรวจสอบ...</div>
    </div>

    <!-- Status Cards -->
    <div class="status-card">
      <div class="status-item">
        <div class="status-icon disconnected" id="thaiid-icon">
          <span>🔌</span>
        </div>
        <div class="status-text">
          <div class="status-label">เครื่องอ่านบัตร</div>
          <div class="status-value" id="thaiid-status">กำลังตรวจสอบ...</div>
        </div>
      </div>

      <div class="status-item">
        <div class="status-icon disconnected" id="server-icon">
          <span>🌐</span>
        </div>
        <div class="status-text">
          <div class="status-label">เชื่อมต่อ Server</div>
          <div class="status-value" id="server-status">กำลังตรวจสอบ...</div>
        </div>
      </div>
    </div>

    <div class="info-text">
      💡 <strong>วิธีใช้งาน:</strong><br>
      เสียบบัตรประชาชนเข้าเครื่องอ่านบัตร<br>
      โปรแกรมจะอ่านและเปิดเว็บให้ดูผลอัตโนมัติ
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
